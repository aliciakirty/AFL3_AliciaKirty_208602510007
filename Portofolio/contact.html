<section class="container mt-5 pt-5">
  <h2 class="text-center mb-4 fw-bold">Contact Me!</h2>

  <p class="text-center mb-4">
    Feel free to reach out and let's build something great together.
  </p>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div id="alertBox"></div>

      <form id="contactForm" class="p-4 shadow bg-white rounded">

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="name" placeholder="Name">
          <label for="name">Your Name</label>
        </div>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="Email">
          <label for="email">Your Email</label>
        </div>

        <div class="form-floating mb-3">
          <textarea class="form-control" id="message" style="height: 120px" placeholder="Message"></textarea>
          <label for="message">Your Message</label>
        </div>

        <button id="submitBtn" type="submit" class="btn btn-primary w-100">
          Send Message
        </button>

      </form>
    </div>
  </div>

  <p class="text-center mt-4">
    📧 aliciakirty01@student.ciputra.ac.id
  </p>
